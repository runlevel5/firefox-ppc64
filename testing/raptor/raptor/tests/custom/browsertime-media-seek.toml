# Media seek-latency benchmark. Measures the time from issuing a buffered
# long-distance currentTime= seek to the 'seeked' event, which is dominated by
# the keyframe->target GOP re-decode. Seeks are measured with the decoder warm
# (kept playing) and cold (paused so the decoder is released and recreated per
# seek). The clip is loaded from a Blob embedded in the test script (no
# network/hosting).
[DEFAULT]
alert_threshold = 5.0
alert_on = "seekedColdLatency, seekedWarmLatency"
browser_cycles = 1
custom_data = true
gecko_profile_interval = 1
gecko_profile_features = "stackwalk,js,cpu,screenshots"
gecko_profile_threads = "GeckoMain,Compositor,MediaDecoderStateMachine,MediaSupervisor,MediaPDecoder,RemVidChild,RemVidParent"
lower_is_better = true
owner = "Media Team"
page_cycles = 5
page_timeout = 120000
subtest_unit = "ms"
test_summary = "flatten"
type = "pageload"
unit = "ms"
apps = "firefox, chrome, safari"
measure = "seekedColdLatency, seekedWarmLatency"
support_class = "media_seek.py"
test_url = "None"
use_live_sites = false
preferences = [
  "media.autoplay.default=0",
  "media.autoplay.blocking_policy=0",
  "media.autoplay.ask-permission=false",
  "media.dormant-on-pause-timeout-ms=0",
]

["media-seek"]
test_script = "media_seek.js"
browsertime_args = "--browsertime.iterations=5"
